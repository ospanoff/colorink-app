repos:
  - repo: local
    hooks:
      # Fixed commands on src/; always_run avoids skip when nothing is git-tracked yet.
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check src
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format src
        language: system
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty
        entry: uv run ty check src
        language: system
        pass_filenames: false
        always_run: true
