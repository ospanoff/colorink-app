repos:
  - repo: local
    hooks:
      # Fixed commands on src/; always_run avoids skip when nothing is git-tracked yet.
      - id: ruff-check
        name: ruff check
        # --frozen: do not rewrite uv.lock (e.g. alternate index URLs in CI / corp mirrors).
        entry: uv run --frozen ruff check src
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format
        entry: uv run --frozen ruff format src
        language: system
        pass_filenames: false
        always_run: true
      - id: ty
        name: ty
        entry: uv run --frozen ty check src
        language: system
        pass_filenames: false
        always_run: true
